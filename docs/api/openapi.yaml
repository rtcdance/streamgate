openapi: 3.0.3
info:
  title: StreamGate API
  description: |
    NFT-gated streaming platform API. Core flow: wallet sign-in → NFT verification → protected HLS streaming.

    ## Authentication
    Most endpoints require JWT authentication. Include the token in the Authorization header:
    ```
    Authorization: Bearer <your-jwt-token>
    ```

    ## NFT Permission Control
    Content is protected by NFT ownership. Users must hold the specified NFT to access protected streaming content.
  version: 1.0.0
  contact:
    name: StreamGate Team
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: /api/v1
    description: Relative path (behind proxy)
  - url: http://localhost:8080/api/v1
    description: Local development

tags:
  - name: Health
    description: Service health and readiness
  - name: Auth
    description: Wallet-based authentication (EIP-191/EIP-712/SIWE)
  - name: NFT
    description: NFT ownership verification
  - name: Content
    description: Content management (CRUD)
  - name: Streaming
    description: HLS manifest and segment delivery
  - name: Upload
    description: File upload (single and chunked)
  - name: Transcoding
    description: Transcoding job management
  - name: Web3
    description: Blockchain RPC status

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Checks service health including DB, Redis, and MinIO connectivity
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      operationId: getReady
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service not ready

  /metrics:
    get:
      tags: [Health]
      summary: Prometheus metrics
      description: Returns Prometheus metrics in text format
      operationId: getMetrics
      responses:
        "200":
          description: Metrics retrieved
          content:
            text/plain: {}

  /auth/challenge:
    post:
      tags: [Auth]
      summary: Request a sign-in challenge
      description: Returns a nonce for the wallet to sign (EIP-191/EIP-712/SIWE)
      operationId: postAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeRequest"
      responses:
        "200":
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"

  /auth/login:
    post:
      tags: [Auth]
      summary: Wallet login
      description: Verifies wallet signature and returns JWT
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid signature

  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      description: Registers a new user with username and password
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
        "409":
          description: User already exists

  /auth/verify:
    post:
      tags: [Auth]
      summary: Verify JWT token
      description: Validates a JWT token and returns its claims
      operationId: postAuthVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyTokenRequest"
      responses:
        "200":
          description: Token is valid

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      operationId: postAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Revokes the current JWT token
      operationId: postAuthLogout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get user profile
      description: Returns the authenticated user's profile including wallet address
      operationId: getAuthProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Unauthorized

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password
      description: Changes password for username-password users (not available for wallet users)
      operationId: postChangePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
        "400":
          description: Wallet users cannot change password

  /nft:
    get:
      tags: [NFT]
      summary: Query NFT balance
      description: Queries wallet NFT balance for a given contract
      operationId: listNFTs
      security:
        - bearerAuth: []
      parameters:
        - name: contract
          in: query
          required: true
          schema:
            type: string
          description: NFT contract address
        - name: chain_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Chain ID (e.g., 1 for Ethereum, 11155111 for Sepolia)
        - name: owner
          in: query
          schema:
            type: string
          description: Owner address (defaults to authenticated wallet)
      responses:
        "200":
          description: NFT balance info

  /nft/{id}:
    get:
      tags: [NFT]
      summary: Verify NFT token ownership
      description: Verifies ownership of a specific NFT token ID
      operationId: getNFT
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Token ID
        - name: contract
          in: query
          required: true
          schema:
            type: string
        - name: chain_id
          in: query
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: NFT ownership info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NFTInfo"
        "404":
          description: NFT not found

  /nft/verify:
    post:
      tags: [NFT]
      summary: Verify NFT ownership
      description: Comprehensive NFT ownership verification with caching support
      operationId: verifyNFT
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NFTVerifyRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NFTVerifyResponse"

  /content:
    get:
      tags: [Content]
      summary: List content items
      description: Lists content owned by the authenticated user
      operationId: listContent
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Content list

    post:
      tags: [Content]
      summary: Create content
      description: Creates a new content item
      operationId: createContent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentCreate"
      responses:
        "201":
          description: Content created

  /content/{id}:
    get:
      tags: [Content]
      summary: Get content by ID
      operationId: getContent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content details
        "404":
          description: Not found

    put:
      tags: [Content]
      summary: Update content
      operationId: updateContent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentUpdate"
      responses:
        "200":
          description: Content updated

    delete:
      tags: [Content]
      summary: Delete content
      operationId: deleteContent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Content deleted

  /streaming/{id}/manifest.m3u8:
    get:
      tags: [Streaming]
      summary: Get HLS master manifest
      description: Returns HLS manifest with playback tokens embedded in segment URLs. Requires NFT ownership verification.
      operationId: getHLSManifest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Content ID
        - name: token_id
          in: query
          schema:
            type: string
          description: NFT token ID for ownership verification
      responses:
        "200":
          description: HLS manifest
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
        "403":
          description: NFT ownership required
        "404":
          description: Stream not found or transcode still processing

  /streaming/{id}/segment/{num}:
    get:
      tags: [Streaming]
      summary: Get HLS segment
      description: Downloads a video segment. Requires valid playback_token from manifest.
      operationId: getHLSSegment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Content ID
        - name: num
          in: path
          required: true
          schema:
            type: string
          description: Segment filename (e.g., seg_0000.ts)
        - name: playback_token
          in: query
          required: true
          schema:
            type: string
          description: Playback token from manifest response
      responses:
        "200":
          description: HLS segment
          content:
            video/mp2t: {}
        "401":
          description: Missing or invalid playback token
        "404":
          description: Segment not found

  /upload:
    post:
      tags: [Upload]
      summary: Upload a whole file
      description: Uploads a complete file in a single request
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /upload/list:
    get:
      tags: [Upload]
      summary: List uploads
      description: Lists upload records for the authenticated user
      operationId: listUploads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Upload list

  /upload/init:
    post:
      tags: [Upload]
      summary: Initialize chunked upload
      description: Starts a chunked upload session
      operationId: initChunkedUpload
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateUploadRequest"
      responses:
        "200":
          description: Upload session initialized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitiateUploadResponse"

  /upload/chunk:
    post:
      tags: [Upload]
      summary: Upload a file chunk
      description: Uploads a single chunk in a chunked upload session
      operationId: uploadChunk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, upload_id, chunk_index]
              properties:
                file:
                  type: string
                  format: binary
                upload_id:
                  type: string
                chunk_index:
                  type: integer
      responses:
        "200":
          description: Chunk received

  /upload/{id}/complete:
    post:
      tags: [Upload]
      summary: Complete chunked upload
      description: Finalizes a chunked upload session and triggers transcoding
      operationId: completeChunkedUpload
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Upload session ID
      responses:
        "200":
          description: Upload completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompleteUploadResponse"

  /upload/{id}/complete-upload:
    post:
      tags: [Upload]
      summary: Complete upload (alternative)
      description: Alternative endpoint to finalize an upload
      operationId: completeUpload
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload completed

  /upload/{id}/status:
    get:
      tags: [Upload]
      summary: Get upload status
      operationId: getUploadStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadStatus"
        "404":
          description: Upload session not found

  /upload/{id}/download-url:
    get:
      tags: [Upload]
      summary: Get download URL
      description: Returns a presigned download URL for the uploaded file
      operationId: getDownloadURL
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Download URL

  /transcode/submit:
    post:
      tags: [Transcoding]
      summary: Submit transcoding job
      description: Submits a new video transcoding job
      operationId: submitTranscode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTranscodeRequest"
      responses:
        "201":
          description: Job submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitTranscodeResponse"

  /transcode/status/{id}:
    get:
      tags: [Transcoding]
      summary: Get transcoding job status
      operationId: getTranscodeStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Transcoding job ID
      responses:
        "200":
          description: Job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranscodeJobStatus"
        "404":
          description: Job not found

  /transcode/cancel/{id}:
    post:
      tags: [Transcoding]
      summary: Cancel transcoding job
      operationId: cancelTranscode
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job cancelled
        "400":
          description: Job cannot be cancelled

  /transcode/tasks:
    get:
      tags: [Transcoding]
      summary: List transcoding tasks
      description: Lists all transcoding tasks for the authenticated user
      operationId: listTranscodeTasks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Task list

  /transcode/profiles:
    get:
      tags: [Transcoding]
      summary: List transcoding profiles
      description: Returns available transcoding quality profiles
      operationId: listTranscodeProfiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile list

  /web3/rpc-status:
    get:
      tags: [Web3]
      summary: Get RPC endpoint statuses
      description: Returns health status of all configured blockchain RPC endpoints
      operationId: getRPCStatus
      responses:
        "200":
          description: RPC status for all chains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RPCStatus"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [healthy, unhealthy]
        timestamp:
          type: string
          format: date-time
        services:
          type: object
          additionalProperties:
            type: string
            enum: [healthy, unhealthy]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: object
          additionalProperties: true
      required:
        - error
        - code

    ChallengeRequest:
      type: object
      required: [wallet_address]
      properties:
        wallet_address:
          type: string
          description: Wallet address to generate challenge for
          example: "0x1234567890123456789012345678901234567890"

    ChallengeResponse:
      type: object
      properties:
        nonce:
          type: string
          description: Challenge nonce to sign
          example: "abc123def456"
        message:
          type: string
          description: Full message to sign (EIP-191/EIP-712/SIWE)
          example: "Sign this message to authenticate: abc123def456"
        expires_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [wallet_address, signature]
      properties:
        wallet_address:
          type: string
        signature:
          type: string
          description: EIP-191 signed message

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    VerifyTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT token to verify

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    ProfileResponse:
      type: object
      properties:
        wallet_address:
          type: string
        username:
          type: string
        created_at:
          type: string
          format: date-time

    ChangePasswordRequest:
      type: object
      required: [old_password, new_password]
      properties:
        old_password:
          type: string
          format: password
        new_password:
          type: string
          format: password

    NFTInfo:
      type: object
      properties:
        contract_address:
          type: string
        token_id:
          type: string
        owner:
          type: string
        name:
          type: string
        symbol:
          type: string
        uri:
          type: string

    NFTVerifyRequest:
      type: object
      required: [chain_id, contract_address, token_id, owner_address]
      properties:
        chain_id:
          type: integer
          format: int64
          example: 11155111
        contract_address:
          type: string
          description: NFT contract address
        token_id:
          type: string
          description: NFT token ID
        owner_address:
          type: string
          description: Wallet address to verify ownership

    NFTVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
          description: Whether the wallet owns the NFT
        balance:
          type: integer
          format: int64
          description: Token balance (for ERC-1155)
        cached:
          type: boolean
          description: Whether result was from cache

    ContentCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        content_type:
          type: string
          enum: [video, audio, image, document, livestream]
          default: video
        nft_contract_address:
          type: string
          description: NFT contract required for access

    ContentUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string

    InitiateUploadRequest:
      type: object
      required: [filename, file_size, chunk_size]
      properties:
        filename:
          type: string
          description: Name of the file
        file_size:
          type: integer
          format: int64
          description: Size of the file in bytes
        chunk_size:
          type: integer
          description: Size of each chunk in bytes
          default: 5242880

    InitiateUploadResponse:
      type: object
      properties:
        upload_id:
          type: string
          description: Unique upload session ID
        chunk_size:
          type: integer
        total_chunks:
          type: integer
        expires_at:
          type: string
          format: date-time

    UploadResponse:
      type: object
      properties:
        id:
          type: string
        url:
          type: string

    CompleteUploadResponse:
      type: object
      properties:
        file_id:
          type: string
        upload_id:
          type: string
        file_size:
          type: integer
          format: int64
        transcoding_job_id:
          type: string

    UploadStatus:
      type: object
      properties:
        upload_id:
          type: string
        status:
          type: string
          enum: [pending, uploading, completed, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        uploaded_bytes:
          type: integer
          format: int64
        total_bytes:
          type: integer
          format: int64
        uploaded_chunks:
          type: integer
        total_chunks:
          type: integer

    SubmitTranscodeRequest:
      type: object
      required: [input_url, profile]
      properties:
        input_url:
          type: string
          description: URL or path to input file
        profile:
          type: string
          description: Transcoding profile name
          example: "1080p-hls"
        output_format:
          type: string
          enum: [hls, dash]
          default: hls

    SubmitTranscodeResponse:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]

    TranscodeJobStatus:
      type: object
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed]
        progress:
          type: integer
          minimum: 0
          maximum: 100
        output_url:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        error:
          type: string

    RPCStatus:
      type: object
      properties:
        chain_id:
          type: integer
          format: int64
        url:
          type: string
        active:
          type: boolean
        failures:
          type: integer
        cooldown_until:
          type: string
          format: date-time

security:
  - bearerAuth: []
