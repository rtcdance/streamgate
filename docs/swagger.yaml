openapi: 3.0.3
info:
  title: StreamGate API
  description: NFT-gated streaming platform API. Core flow — wallet sign-in, NFT verification, protected HLS streaming.
  version: 1.0.0
  contact:
    name: StreamGate
servers:
  - url: /api/v1
    description: Relative path (behind proxy)

tags:
  - name: Health
    description: Service health and readiness
  - name: Auth
    description: Wallet-based authentication (EIP-191)
  - name: NFT
    description: NFT ownership verification
  - name: Content
    description: Content management (CRUD)
  - name: Streaming
    description: HLS manifest and segment delivery
  - name: Upload
    description: File upload (single and chunked)
  - name: Web3
    description: Blockchain RPC status
  - name: Transcoding
    description: Transcoding job management

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /ready:
    get:
      tags: [Health]
      summary: Readiness check
      operationId: getReady
      responses:
        "200":
          description: Service is ready
        "503":
          description: Service not ready

  /auth/challenge:
    post:
      tags: [Auth]
      summary: Request a sign-in challenge
      description: Returns a nonce for the wallet to sign (EIP-191)
      operationId: postAuthChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChallengeRequest"
      responses:
        "200":
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChallengeResponse"

  /auth/verify:
    post:
      tags: [Auth]
      summary: Verify signed challenge
      description: Verifies EIP-191 signature and returns JWT
      operationId: postAuthVerify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid signature

  /auth/login:
    post:
      tags: [Auth]
      summary: Wallet login
      operationId: postAuthLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register new wallet
      operationId: postAuthRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registration successful
        "409":
          description: Wallet already registered

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      operationId: postAuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      operationId: postAuthLogout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out

  /auth/profile:
    get:
      tags: [Auth]
      summary: Get user profile
      operationId: getAuthProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
        "401":
          description: Unauthorized

  /nft:
    get:
      tags: [NFT]
      summary: List NFTs
      operationId: listNFTs
      security:
        - bearerAuth: []
      parameters:
        - name: chain_id
          in: query
          schema:
            type: integer
            format: int64
        - name: owner
          in: query
          schema:
            type: string
      responses:
        "200":
          description: NFT list

  /nft/{id}:
    get:
      tags: [NFT]
      summary: Get NFT info
      operationId: getNFT
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NFT info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NFTInfo"
        "404":
          description: NFT not found

  /nft/verify:
    post:
      tags: [NFT]
      summary: Verify NFT ownership
      operationId: verifyNFT
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NFTVerifyRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NFTVerifyResponse"

  /content:
    get:
      tags: [Content]
      summary: List content items
      operationId: listContent
      security:
        - bearerAuth: []
      parameters:
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Content list

    post:
      tags: [Content]
      summary: Create content
      operationId: createContent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentCreate"
      responses:
        "201":
          description: Content created

  /content/{id}:
    get:
      tags: [Content]
      summary: Get content by ID
      operationId: getContent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Content details
        "404":
          description: Not found

    put:
      tags: [Content]
      summary: Update content
      operationId: updateContent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentUpdate"
      responses:
        "200":
          description: Content updated

    delete:
      tags: [Content]
      summary: Delete content
      operationId: deleteContent
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Content deleted

  /streaming/{id}/manifest.m3u8:
    get:
      tags: [Streaming]
      summary: Get HLS master manifest
      description: Requires NFT ownership verification
      operationId: getHLSManifest
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HLS manifest
          content:
            application/vnd.apple.mpegurl:
              schema:
                type: string
        "403":
          description: NFT ownership required
        "404":
          description: Stream not found

  /streaming/{id}/segment/{num}:
    get:
      tags: [Streaming]
      summary: Get HLS segment
      description: Requires NFT ownership verification
      operationId: getHLSSegment
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: num
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: HLS segment (video/MP2T)
        "403":
          description: NFT ownership required

  /upload:
    post:
      tags: [Upload]
      summary: Upload a file
      operationId: uploadFile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"

  /upload/chunk:
    post:
      tags: [Upload]
      summary: Upload a file chunk
      operationId: uploadChunk
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, upload_id, chunk_index]
              properties:
                file:
                  type: string
                  format: binary
                upload_id:
                  type: string
                chunk_index:
                  type: integer
      responses:
        "200":
          description: Chunk received

  /upload/{id}/status:
    get:
      tags: [Upload]
      summary: Get upload status
      operationId: getUploadStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Upload status

  /web3/rpc-status:
    get:
      tags: [Web3]
      summary: Get RPC endpoint statuses
      operationId: getRPCStatus
      security:
        - bearerAuth: []
      responses:
        "200":
          description: RPC status for all chains

  /transcode/submit:
    post:
      tags: [Transcoding]
      summary: Submit transcoding job
      operationId: submitTranscode
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranscodeRequest"
      responses:
        "201":
          description: Job submitted

  /transcode/status/{id}:
    get:
      tags: [Transcoding]
      summary: Get transcoding job status
      operationId: getTranscodeStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job status

  /transcode/cancel/{id}:
    post:
      tags: [Transcoding]
      summary: Cancel transcoding job
      operationId: cancelTranscode
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job cancelled

  /transcode/tasks:
    get:
      tags: [Transcoding]
      summary: List transcoding tasks
      operationId: listTranscodeTasks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Task list

  /transcode/profiles:
    get:
      tags: [Transcoding]
      summary: List transcoding profiles
      operationId: listTranscodeProfiles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Profile list

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        uptime:
          type: string

    ChallengeRequest:
      type: object
      required: [wallet_address]
      properties:
        wallet_address:
          type: string
          example: "0x1234567890123456789012345678901234567890"

    ChallengeResponse:
      type: object
      properties:
        nonce:
          type: string
          example: "abc123def456"
        message:
          type: string
          example: "Sign this message to authenticate: abc123def456"

    VerifyRequest:
      type: object
      required: [wallet_address, signature]
      properties:
        wallet_address:
          type: string
        signature:
          type: string

    LoginRequest:
      type: object
      required: [wallet_address, signature]
      properties:
        wallet_address:
          type: string
        signature:
          type: string

    RegisterRequest:
      type: object
      required: [wallet_address, signature]
      properties:
        wallet_address:
          type: string
        signature:
          type: string

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        refresh_token:
          type: string
        expires_at:
          type: string
          format: date-time

    NFTInfo:
      type: object
      properties:
        contract_address:
          type: string
        token_id:
          type: string
        owner:
          type: string
        name:
          type: string
        symbol:
          type: string
        uri:
          type: string

    NFTVerifyRequest:
      type: object
      required: [chain_id, contract_address, token_id, owner_address]
      properties:
        chain_id:
          type: integer
          format: int64
          example: 11155111
        contract_address:
          type: string
        token_id:
          type: string
        owner_address:
          type: string

    NFTVerifyResponse:
      type: object
      properties:
        verified:
          type: boolean
        balance:
          type: integer
          format: int64

    ContentCreate:
      type: object
      required: [title, nft_contract_address]
      properties:
        title:
          type: string
        description:
          type: string
        nft_contract_address:
          type: string

    ContentUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string

    UploadResponse:
      type: object
      properties:
        id:
          type: string
        url:
          type: string

    TranscodeRequest:
      type: object
      required: [input_url, profile]
      properties:
        input_url:
          type: string
        profile:
          type: string
          example: "1080p-hls"
