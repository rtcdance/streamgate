      dockerfile: deploy/docker/Dockerfile.auth
    container_name: sg-fc-auth
    environment:
      - APP_DEBUG=true
      - STREAMGATE_JWT_SECRET=fullchain-acceptance-secret-2026
      - STREAMGATE_DB_HOST=postgres
