      - STREAMGATE_DB_USER=postgres
      - STREAMGATE_DB_PASSWORD=postgres
      - STREAMGATE_DB_NAME=streamgate
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_ETH_RPC=http://anvil:8545
    depends_on:
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  transcoder:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.transcoder
    container_name: sg-fc-transcoder
    environment:
      - APP_DEBUG=true
      - STREAMGATE_JWT_SECRET=fullchain-acceptance-secret-2026
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=postgres
      - STREAMGATE_DB_PASSWORD=postgres
      - STREAMGATE_DB_NAME=streamgate
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=minioadmin
      - STREAMGATE_STORAGE_SECRET_KEY=minioadmin
      - STREAMGATE_STORAGE_BUCKET=streamgate
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
    depends_on:
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  upload:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.upload
    container_name: sg-fc-upload
    environment:
      - APP_DEBUG=true
      - STREAMGATE_JWT_SECRET=fullchain-acceptance-secret-2026
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=postgres
      - STREAMGATE_DB_PASSWORD=postgres
      - STREAMGATE_DB_NAME=streamgate
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=minioadmin
      - STREAMGATE_STORAGE_SECRET_KEY=minioadmin
      - STREAMGATE_STORAGE_BUCKET=streamgate
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
    depends_on:
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  streaming:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.streaming
    container_name: sg-fc-streaming
    environment:
      - APP_DEBUG=true
      - STREAMGATE_JWT_SECRET=fullchain-acceptance-secret-2026
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=postgres
      - STREAMGATE_DB_PASSWORD=postgres
      - STREAMGATE_DB_NAME=streamgate
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=minioadmin
      - STREAMGATE_STORAGE_SECRET_KEY=minioadmin
      - STREAMGATE_STORAGE_BUCKET=streamgate
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
