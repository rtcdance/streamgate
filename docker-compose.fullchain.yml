        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ---- H5 Demo (dual port) ----
  h5-demo:
    image: nginx:alpine
    container_name: sg-fc-h5-demo
    ports:
      - "18000:8080"
      - "18001:8081"
    volumes:
      - ./h5-demo:/usr/share/nginx/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      monolith:
        condition: service_healthy
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  fc-postgres-data:
  fc-redis-data:
  fc-minio-data:
  fc-nats-data:
  fc-consul-data:
