# Full-chain dual deployment: monolith (:18000) + microservices (:18001)
# Usage: docker compose -f docker-compose.fullchain.yml up --build
# Monolith demo: http://localhost:18000/demo/
# Microservices demo: http://localhost:18001/demo/
services:
  # ---- Shared Infrastructure ----
  postgres:
    image: postgres:15-alpine
    container_name: sg-fc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: streamgate
    ports:
      - "15432:5432"
    volumes:
      - fc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sg-fc-redis
    ports:
      - "16379:6379"
    volumes:
      - fc-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: sg-fc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - fc-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2.10-alpine
    container_name: sg-fc-nats
    command: "-js"
    ports:
      - "14222:4222"
    volumes:
      - fc-nats-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--version"]
      interval: 5s
      timeout: 3s
      retries: 5

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: sg-fc-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--slots-in-an-epoch", "1"]
    ports:
      - "18545:8545"
    healthcheck:
      test: ["CMD", "cast", "rpc", "eth_chainId"]
      interval: 5s
      timeout: 3s
      retries: 10

  consul:
    image: hashicorp/consul:latest
    container_name: sg-fc-consul
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "28500:8500"
    volumes:
      - fc-consul-data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---- Monolith ----
  monolith:
    image: streamgate-fullchain:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PKG: ./cmd/monolith/streamgate
        EXTRA_PKGS: ffmpeg
        GOPROXY_VALUE: https://goproxy.cn,direct
    container_name: sg-fc-monolith
    ports:
      - "18080:8080"
      - "19090:9090"
    environment:
      - APP_DEBUG=true
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=postgres
      - STREAMGATE_DB_PASSWORD=postgres
      - STREAMGATE_DB_NAME=streamgate
      - STREAMGATE_DB_SSLMODE=disable
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_TYPE=minio
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=minioadmin
      - STREAMGATE_STORAGE_SECRET_KEY=minioadmin
      - STREAMGATE_STORAGE_BUCKET=streamgate
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_JWT_SECRET=fullchain-acceptance-secret-2026
      - STREAMGATE_CORS_ORIGINS=http://localhost:18000,http://localhost:18001,http://localhost:3000,http://localhost:8080,http://localhost:18080
      - STREAMGATE_ETH_RPC=http://anvil:8545
      - WEB3_CHAIN_ID=31337
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      anvil:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  # ---- Microservices ----
  api-gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api-gateway.quick
    container_name: sg-fc-api-gateway
    ports:
      - "28080:8080"
    environment:
      - APP_DEBUG=true
      - STREAMGATE_JWT_SECRET=fullchain-acceptance-secret-2026
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=postgres
      - STREAMGATE_DB_PASSWORD=postgres
      - STREAMGATE_DB_NAME=streamgate
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=minioadmin
      - STREAMGATE_STORAGE_SECRET_KEY=minioadmin
      - STREAMGATE_STORAGE_BUCKET=streamgate
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_ETH_RPC=http://anvil:8545
      - STREAMGATE_CORS_ORIGINS=http://localhost:18000,http://localhost:18001,http://localhost:28080,http://localhost:3000,http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped

  auth:
    build:
