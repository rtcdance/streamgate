name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.24"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v1.64
          args: --timeout=5m

      - name: Run go vet
        run: go vet ./...

  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: streamgate
          POSTGRES_PASSWORD: streamgate
          POSTGRES_DB: streamgate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go mod download

      - name: Setup database schema
        env:
          PGPASSWORD: streamgate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          for f in $(ls migrations/*.sql | grep -v '.down.sql' | sort); do
            echo "Applying $f..."
            psql -h localhost -U streamgate -d streamgate_test < "$f" || true
          done

      - name: Run tests
        run: |
          go test -race -coverprofile=coverage.out \
            $(go list ./... | grep -v '/test/e2e' | grep -v '/test/load' | grep -v '/test/integration/web3')
        env:
          STREAMGATE_DB_HOST: localhost
          STREAMGATE_DB_PORT: 5432
          STREAMGATE_DB_USER: streamgate
          STREAMGATE_DB_PASSWORD: streamgate
          STREAMGATE_DB_NAME: streamgate_test
          STREAMGATE_REDIS_HOST: localhost
          STREAMGATE_REDIS_PORT: 6379

      - name: Check coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 10" | bc -l)" = "1" ]; then
            echo "Coverage ${COVERAGE}% is below 10% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
        continue-on-error: true

  test-contracts:
    name: Solidity Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install Forge dependencies
        run: forge install

      - name: Run Forge tests
        run: forge test -vvv

      - name: Gas report
        run: forge test --gas-report
        continue-on-error: true

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go mod download

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum is not tidy" && exit 1)

      - name: Build all binaries
        run: make build-all VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "ci-$(git rev-parse --short HEAD)")

      - name: Check binary sizes
        run: |
          echo "=== Binary Sizes ==="
          ls -lh bin/ 2>/dev/null || echo "No bin/ directory found"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run gosec
        uses: securego/gosec@v2.21.4
        with:
          args: -exclude-dir=examples -exclude-dir=test -exclude-dir=pkg/api -exclude=G103,G104,G115,G204,G301,G304,G306 ./...

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: contracts/
          slither-args: --filter-paths "lib|test"
        continue-on-error: true

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-go, build]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build monolith image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.monolith
          push: false
          load: true
          tags: streamgate-monolith:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test monolith
        run: |
          docker run --rm streamgate-monolith:ci \
            sh -c "ls -la /app/streamgate && echo 'Binary exists and is executable'" || echo "Smoke test completed with warnings (expected without config)"
