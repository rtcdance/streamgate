name: Deploy to Production

on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-docker:
    name: Deploy with Docker Compose
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Deploy to production
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          if [ -z "$DEPLOY_KEY" ] || [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_USER" ]; then
            echo "Deployment credentials not configured, skipping Docker Compose deployment"
            exit 0
          fi
          SSH_DIR=$(mktemp -d)
          trap 'rm -rf "$SSH_DIR"' EXIT
          echo "$DEPLOY_KEY" > "$SSH_DIR/deploy_key"
          chmod 600 "$SSH_DIR/deploy_key"
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -i "$SSH_DIR/deploy_key" -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" << 'EOF'
            cd /opt/streamgate
            git pull origin master
            docker-compose pull
            docker-compose up -d
          EOF

  deploy-kubernetes:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.28.0'

      - name: Configure kubectl
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "KUBE_CONFIG secret not configured, skipping Kubernetes deployment"
            exit 0
          fi
          KUBE_DIR=$(mktemp -d)
          trap 'rm -rf "$KUBE_DIR"' EXIT
          echo "$KUBE_CONFIG" | base64 -d > "$KUBE_DIR/config"
          chmod 600 "$KUBE_DIR/config"
          mkdir -p ~/.kube
          cp "$KUBE_DIR/config" ~/.kube/config

      - name: Deploy with kustomize
        env:
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          if [ ! -f ~/.kube/config ]; then
            echo "Kubernetes not configured, skipping deployment"
            exit 0
          fi
          kubectl apply -k deploy/k8s/
          kubectl set image deployment/api-gateway -n streamgate streamgate=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api-gateway:$IMAGE_TAG --namespace=streamgate 2>/dev/null || true
          kubectl set image deployment/auth -n streamgate streamgate=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth:$IMAGE_TAG --namespace=streamgate 2>/dev/null || true

      - name: Wait for rollout
        run: |
          if [ ! -f ~/.kube/config ]; then
            exit 0
          fi
          kubectl rollout status deployment/api-gateway -n streamgate --timeout=5m 2>/dev/null || true
          kubectl rollout status deployment/auth -n streamgate --timeout=5m 2>/dev/null || true

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-docker, deploy-kubernetes]
    if: always()
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          JOB_STATUS: ${{ job.status }}
          DOCKER_RESULT: ${{ needs.deploy-docker.result }}
          KUBERNETES_RESULT: ${{ needs.deploy-kubernetes.result }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$DISCORD_WEBHOOK" ]; then
            STATUS_EMOJI="✅"
            [ "$JOB_STATUS" = "failure" ] && STATUS_EMOJI="❌"
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{
                \"content\": \"${STATUS_EMOJI} **StreamGate Deployment**\\nVersion: ${REF_NAME}\\nStatus: ${JOB_STATUS}\\nDocker: ${DOCKER_RESULT}\\nKubernetes: ${KUBERNETES_RESULT}\\nAuthor: ${ACTOR}\"
              }" || echo "Failed to send Discord notification"
          else
            echo "Discord webhook not configured, skipping Discord notification"
          fi

      - name: Create GitHub issue on failure
        uses: actions/github-script@v7
        if: failure()
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deployment Failed: ${context.ref}`,
              body: `## Deployment Failure Report

              **Version:** ${context.refName}
              **Status:** ${context.job.status}
              **Docker Deployment:** ${{ needs.deploy-docker.result }}
              **Kubernetes Deployment:** ${{ needs.deploy-kubernetes.result }}

              **Commit:** ${context.sha}
              **Author:** ${context.actor}

              **Workflow Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}

              Please investigate the deployment logs and fix the issue.`,
              labels: ['deployment', 'bug']
            })
