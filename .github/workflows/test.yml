name: Comprehensive Test Suite

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GO_VERSION: '1.24'
  GOPROXY: 'https://goproxy.io,direct'

jobs:
  verify-deps:
    name: Verify Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum is not tidy" && exit 1)

      - name: Verify dependencies
        run: go mod verify

  unit-tests:
    name: Unit Tests - ${{ matrix.test-path }}
    runs-on: ubuntu-latest
    needs: verify-deps
    strategy:
      fail-fast: false
      matrix:
        test-path:
          - test-unit-core
          - test-unit-middleware
          - test-unit-models
          - test-unit-monitoring
          - test-unit-service
          - test-unit-storage
          - test-unit-util
          - test-unit-web3
          - test-pkg
          - test-cmd
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set Go path
        run: |
          echo "GOROOT=$GOROOT" >> $GITHUB_ENV

      - name: Set test path
        id: set-path
        run: |
          case "${{ matrix.test-path }}" in
            test-unit-core) echo "path=./pkg/core/..." >> $GITHUB_OUTPUT ;;
            test-unit-middleware) echo "path=./pkg/middleware/..." >> $GITHUB_OUTPUT ;;
            test-unit-models) echo "path=./pkg/models/..." >> $GITHUB_OUTPUT ;;
            test-unit-monitoring) echo "path=./pkg/monitoring/..." >> $GITHUB_OUTPUT ;;
            test-unit-service) echo "path=./pkg/service/..." >> $GITHUB_OUTPUT ;;
            test-unit-storage) echo "path=./pkg/storage/..." >> $GITHUB_OUTPUT ;;
            test-unit-util) echo "path=./pkg/util/..." >> $GITHUB_OUTPUT ;;
            test-unit-web3) echo "path=./pkg/web3/..." >> $GITHUB_OUTPUT ;;
            test-pkg) echo "path=./pkg/..." >> $GITHUB_OUTPUT ;;
            test-cmd) echo "path=./cmd/..." >> $GITHUB_OUTPUT ;;
          esac

      - name: Run unit tests
        run: go test -v -race -p=1 -coverprofile=coverage.out ${{ steps.set-path.outputs.path }}

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 25" | bc -l)" = "1" ]; then
            echo "Coverage ${COVERAGE}% is below 25% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.test-path }}
          path: coverage.out
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests - ${{ matrix.test-path }}
    runs-on: ubuntu-latest
    needs: verify-deps
    strategy:
      fail-fast: false
      matrix:
        test-path:
          - test-integration-api
          - test-integration-auth
          - test-integration-content
          - test-integration-dashboard
          - test-integration-middleware
          - test-integration-models
          - test-integration-monitoring
          - test-integration-service
          - test-integration-storage
          - test-integration-streaming
          - test-integration-transcoding
          - test-integration-upload
          - test-integration-web3
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: streamgate
          POSTGRES_PASSWORD: streamgate
          POSTGRES_DB: streamgate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start MinIO
        run: |
          mkdir -p /tmp/minio
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -v /tmp/minio:/data \
            minio/minio:latest server /data --console-address ":9001"
          echo "Waiting for MinIO to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done

      - name: Setup database
        env:
          PGPASSWORD: streamgate
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for f in migrations/*.sql; do psql -h localhost -U streamgate -d streamgate < "$f"; done

      - name: Set test path
        id: set-path
        run: |
          case "${{ matrix.test-path }}" in
            test-integration-api) echo "path=./test/integration/api/..." >> $GITHUB_OUTPUT ;;
            test-integration-auth) echo "path=./test/integration/auth/..." >> $GITHUB_OUTPUT ;;
            test-integration-content) echo "path=./test/integration/content/..." >> $GITHUB_OUTPUT ;;
            test-integration-dashboard) echo "path=./test/integration/dashboard/..." >> $GITHUB_OUTPUT ;;
            test-integration-middleware) echo "path=./test/integration/middleware/..." >> $GITHUB_OUTPUT ;;
            test-integration-models) echo "path=./test/integration/models/..." >> $GITHUB_OUTPUT ;;
            test-integration-monitoring) echo "path=./test/integration/monitoring/..." >> $GITHUB_OUTPUT ;;
            test-integration-service) echo "path=./test/integration/service/..." >> $GITHUB_OUTPUT ;;
            test-integration-storage) echo "path=./test/integration/storage/..." >> $GITHUB_OUTPUT ;;
            test-integration-streaming) echo "path=./test/integration/streaming/..." >> $GITHUB_OUTPUT ;;
            test-integration-transcoding) echo "path=./test/integration/transcoding/..." >> $GITHUB_OUTPUT ;;
            test-integration-upload) echo "path=./test/integration/upload/..." >> $GITHUB_OUTPUT ;;
            test-integration-web3) echo "path=./test/integration/web3/..." >> $GITHUB_OUTPUT ;;
          esac

      - name: Run integration tests
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: streamgate
          DATABASE_PASSWORD: streamgate
          DATABASE_NAME: streamgate
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_USE_SSL: false
        run: go test -v -race -p=1 -coverprofile=coverage.out ${{ steps.set-path.outputs.path }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-${{ matrix.test-path }}
          path: coverage.out
          if-no-files-found: ignore

      - name: Cleanup MinIO
        if: always()
        run: |
          docker stop minio || true
          docker rm minio || true

  e2e-tests:
    name: E2E Tests - ${{ matrix.test-file }}
    runs-on: ubuntu-latest
    needs: verify-deps
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - api_gateway_test.go
          - auth_flow_test.go
          - blue_green_deployment_test.go
          - canary_deployment_test.go
          - content_management_test.go
          - core_functionality_test.go
          - dashboard_e2e_test.go
          - middleware_flow_test.go
          - models_test.go
          - monitoring_flow_test.go
          - nft_verification_test.go
          - plugin_integration_test.go
          - streaming_flow_test.go
          - transcoding_flow_test.go
          - upload_flow_test.go
          - util_functions_test.go
          - web3_integration_test.go
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: streamgate
          POSTGRES_PASSWORD: streamgate
          POSTGRES_DB: streamgate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start MinIO
        run: |
          mkdir -p /tmp/minio
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -v /tmp/minio:/data \
            minio/minio:latest server /data --console-address ":9001"
          echo "Waiting for MinIO to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done

      - name: Setup database
        env:
          PGPASSWORD: streamgate
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for f in migrations/*.sql; do psql -h localhost -U streamgate -d streamgate < "$f"; done

      - name: Run E2E test - ${{ matrix.test-file }}
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: streamgate
          DATABASE_PASSWORD: streamgate
          DATABASE_NAME: streamgate
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_USE_SSL: false
        run: go test -v -race -coverprofile=coverage.out ./test/e2e/${{ matrix.test-file }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-${{ matrix.test-file }}
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 1

      - name: Cleanup MinIO
        if: always()
        run: |
          docker stop minio || true
          docker rm minio || true

  benchmark-tests:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: verify-deps
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ ./test/benchmark/... | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt

  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: verify-deps
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: streamgate
          POSTGRES_PASSWORD: streamgate
          POSTGRES_DB: streamgate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start MinIO
        run: |
          mkdir -p /tmp/minio
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -v /tmp/minio:/data \
            minio/minio:latest server /data --console-address ":9001"
          echo "Waiting for MinIO to be ready..."
          for i in {1..30}; do
            if curl -f http://localhost:9000/minio/health/live; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done

      - name: Create MinIO bucket
        run: |
          wget -q https://dl.min.io/client/mc/release/linux-amd64/mc
          chmod +x mc
          ./mc alias set local http://localhost:9000 minioadmin minioadmin
          ./mc mb local/test-bucket --ignore-existing

      - name: Setup database
        env:
          PGPASSWORD: streamgate
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          for f in migrations/*.sql; do psql -h localhost -U streamgate -d streamgate < "$f"; done

      - name: Run load tests
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: streamgate
          DATABASE_PASSWORD: streamgate
          DATABASE_NAME: streamgate
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MINIO_ENDPOINT: localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_USE_SSL: false
        run: go test -v -timeout=10m ./test/load/...

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        with:
          name: load-test-results
          path: test/load/

      - name: Cleanup MinIO
        if: always()
        run: |
          docker stop minio || true
          docker rm minio || true

