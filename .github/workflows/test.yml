name: Comprehensive Test Suite

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read

env:
  GO_VERSION: '1.24'
  GOPROXY: 'https://goproxy.io,direct'

jobs:
  verify-deps:
    name: Verify Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || (echo "go.mod or go.sum is not tidy" && exit 1)

      - name: Verify dependencies
        run: go mod verify

  unit-tests:
    name: Unit Tests - ${{ matrix.test-path }}
    runs-on: ubuntu-latest
    needs: verify-deps
    strategy:
      fail-fast: false
      matrix:
        test-path:
          - test-unit-core
          - test-unit-middleware
          - test-unit-models
          - test-unit-monitoring
          - test-unit-service
          - test-unit-storage
          - test-unit-util
          - test-unit-web3
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Set test path
        id: set-path
        run: |
          case "${{ matrix.test-path }}" in
            test-unit-core) echo "path=./pkg/core/..." >> $GITHUB_OUTPUT ;;
            test-unit-middleware) echo "path=./pkg/middleware/..." >> $GITHUB_OUTPUT ;;
            test-unit-models) echo "path=./pkg/models/..." >> $GITHUB_OUTPUT ;;
            test-unit-monitoring) echo "path=./pkg/monitoring/..." >> $GITHUB_OUTPUT ;;
            test-unit-service) echo "path=./pkg/service/..." >> $GITHUB_OUTPUT ;;
            test-unit-storage) echo "path=./pkg/storage/..." >> $GITHUB_OUTPUT ;;
            test-unit-util) echo "path=./pkg/util/..." >> $GITHUB_OUTPUT ;;
            test-unit-web3) echo "path=./pkg/web3/..." >> $GITHUB_OUTPUT ;;
          esac

      - name: Run unit tests
        run: go test -v -race -p=1 -coverprofile=coverage.out ${{ steps.set-path.outputs.path }}

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage.out ] || [ ! -s coverage.out ]; then
            echo "No coverage data generated (possibly no test files)"
            exit 0
          fi
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if echo "${{ matrix.test-path }}" | grep -qE "test-unit-models"; then
            echo "Skipping coverage threshold for ${{ matrix.test-path }} (expected low coverage)"
            exit 0
          fi
          if [ "$(echo "$COVERAGE < 10" | bc -l)" = "1" ]; then
            echo "Coverage ${COVERAGE}% is below 10% threshold"
            exit 1
          fi

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.test-path }}
          path: coverage.out
          if-no-files-found: ignore

  integration-tests:
    name: Integration Tests - ${{ matrix.test-path }}
    runs-on: ubuntu-latest
    needs: verify-deps
    strategy:
      fail-fast: false
      matrix:
        test-path:
          - test-integration-api
          - test-integration-auth
          - test-integration-content
          - test-integration-middleware
          - test-integration-models
          - test-integration-monitoring
          - test-integration-service
          - test-integration-storage
          - test-integration-streaming
          - test-integration-transcoding
          - test-integration-upload
          - test-integration-web3
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: streamgate
          POSTGRES_PASSWORD: streamgate
          POSTGRES_DB: streamgate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start MinIO
        run: |
          mkdir -p /tmp/minio
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -v /tmp/minio:/data \
            minio/minio:latest server /data --console-address ":9001"
          echo "Waiting for MinIO to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done

      - name: Setup database
        env:
          PGPASSWORD: streamgate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          for f in $(ls migrations/*.sql | grep -v '.down.sql' | sort); do
            echo "Applying $f..."
            psql -h localhost -U streamgate -d streamgate < "$f" || true
          done

      - name: Set test path
        id: set-path
        run: |
          case "${{ matrix.test-path }}" in
            test-integration-api) echo "path=./test/integration/api/..." >> $GITHUB_OUTPUT ;;
            test-integration-auth) echo "path=./test/integration/auth/..." >> $GITHUB_OUTPUT ;;
            test-integration-content) echo "path=./test/integration/content/..." >> $GITHUB_OUTPUT ;;
            test-integration-middleware) echo "path=./test/integration/middleware/..." >> $GITHUB_OUTPUT ;;
            test-integration-models) echo "path=./test/integration/models/..." >> $GITHUB_OUTPUT ;;
            test-integration-monitoring) echo "path=./test/integration/monitoring/..." >> $GITHUB_OUTPUT ;;
            test-integration-service) echo "path=./test/integration/service/..." >> $GITHUB_OUTPUT ;;
            test-integration-storage) echo "path=./test/integration/storage/..." >> $GITHUB_OUTPUT ;;
            test-integration-streaming) echo "path=./test/integration/streaming/..." >> $GITHUB_OUTPUT ;;
            test-integration-transcoding) echo "path=./test/integration/transcoding/..." >> $GITHUB_OUTPUT ;;
            test-integration-upload) echo "path=./test/integration/upload/..." >> $GITHUB_OUTPUT ;;
            test-integration-web3) echo "path=./test/integration/web3/..." >> $GITHUB_OUTPUT ;;
          esac

      - name: Run integration tests
        env:
          STREAMGATE_DB_HOST: localhost
          STREAMGATE_DB_PORT: 5432
          STREAMGATE_DB_USER: streamgate
          STREAMGATE_DB_PASSWORD: streamgate
          STREAMGATE_DB_NAME: streamgate
          STREAMGATE_REDIS_HOST: localhost
          STREAMGATE_REDIS_PORT: 6379
          STREAMGATE_STORAGE_ENDPOINT: localhost:9000
          STREAMGATE_STORAGE_ACCESS_KEY: minioadmin
          STREAMGATE_STORAGE_SECRET_KEY: minioadmin
          STREAMGATE_STORAGE_USE_SSL: false
        run: go test -v -race -p=1 -coverprofile=coverage.out ${{ steps.set-path.outputs.path }}

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-${{ matrix.test-path }}
          path: coverage.out
          if-no-files-found: ignore

      - name: Cleanup MinIO
        if: always()
        run: |
          docker stop minio || true
          docker rm minio || true

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: verify-deps
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: streamgate
          POSTGRES_PASSWORD: streamgate
          POSTGRES_DB: streamgate
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Start MinIO
        run: |
          mkdir -p /tmp/minio
          docker run -d \
            --name minio \
            -p 9000:9000 \
            -p 9001:9001 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            -v /tmp/minio:/data \
            minio/minio:latest server /data --console-address ":9001"
          echo "Waiting for MinIO to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live > /dev/null 2>&1; then
              echo "MinIO is ready"
              break
            fi
            echo "Waiting for MinIO... ($i/30)"
            sleep 2
          done

      - name: Setup database
        env:
          PGPASSWORD: streamgate
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          for f in $(ls migrations/*.sql | grep -v '.down.sql' | sort); do
            echo "Applying $f..."
            psql -h localhost -U streamgate -d streamgate < "$f" || true
          done

      - name: Run E2E tests
        env:
          STREAMGATE_DB_HOST: localhost
          STREAMGATE_DB_PORT: 5432
          STREAMGATE_DB_USER: streamgate
          STREAMGATE_DB_PASSWORD: streamgate
          STREAMGATE_DB_NAME: streamgate
          STREAMGATE_REDIS_HOST: localhost
          STREAMGATE_REDIS_PORT: 6379
          STREAMGATE_STORAGE_ENDPOINT: localhost:9000
          STREAMGATE_STORAGE_ACCESS_KEY: minioadmin
          STREAMGATE_STORAGE_SECRET_KEY: minioadmin
          STREAMGATE_STORAGE_USE_SSL: false
        run: go test -v -tags=e2e -race -coverprofile=coverage.out ./test/e2e/...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 1

      - name: Cleanup MinIO
        if: always()
        run: |
          docker stop minio || true
          docker rm minio || true

  benchmark-tests:
    name: Benchmark Tests
    runs-on: ubuntu-latest
    needs: verify-deps
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run benchmarks
        run: go test -bench=. -benchmem -run=^$ ./test/benchmark/... 2>&1 | tee benchmark-results.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results.txt
