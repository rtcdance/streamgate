syntax = "proto3";

package common.v1;

option go_package = "streamgate/proto/gen/go/common/v1;commonv1";

message Metadata {
  string request_id = 1;
  int64 timestamp = 2;
  string version = 3;
  map<string, string> headers = 4;
}

message Error {
  string code = 1;
  string message = 2;
  repeated string details = 3;
  string request_id = 4;
}

message Empty {}

message HealthCheckRequest {
  string service = 1;
}

message HealthCheckResponse {
  enum ServingStatus {
    UNKNOWN = 0;
    SERVING = 1;
    NOT_SERVING = 2;
    SERVICE_UNKNOWN = 3;
  }
  ServingStatus status = 1;
}

message PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
  string sort_by = 3;
  string sort_order = 4;
}

message PaginationResponse {
  int32 page = 1;
  int32 page_size = 2;
  int32 total = 3;
  int32 total_pages = 4;
}

message Filter {
  string field = 1;
  string operator = 2;
  string value = 3;
}

message SearchRequest {
  string query = 1;
  repeated Filter filters = 2;
  PaginationRequest pagination = 3;
}

message SearchResponse {
  repeated string results = 1;
  PaginationResponse pagination = 2;
}
