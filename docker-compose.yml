services:
  postgres:
    image: postgres:15-alpine
    container_name: streamgate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-streamgate}
    ports:
      - "25432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  redis:
    image: redis:7-alpine
    container_name: streamgate-redis
    restart: unless-stopped
    ports:
      - "26379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: streamgate-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "29000:9000"
      - "29001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  nats:
    image: nats:2.10-alpine
    container_name: streamgate-nats
    restart: unless-stopped
    command: "-js"
    ports:
      - "24222:4222"
      - "28222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 4222 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  consul:
    image: hashicorp/consul:1.19
    container_name: streamgate-consul
    restart: unless-stopped
    command: agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "28500:8500"
      - "28600:8600/udp"
    volumes:
      - consul-data:/consul/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/v1/status/leader"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: streamgate-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    ports:
      - "29090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    depends_on:
      - api-gateway
      - transcoder
      - upload
      - streaming
      - metadata
      - cache
      - auth
      - worker
      - monitor
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  grafana:
    image: grafana/grafana:11.3.0
    container_name: streamgate-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GF_SECURITY_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GF_SECURITY_ADMIN_PASSWORD:-admin}"
    ports:
      - "23000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  jaeger:
    image: jaegertracing/all-in-one:1.57.0
    container_name: streamgate-jaeger
    restart: unless-stopped
    ports:
      - "25775:5775/udp"
      - "26831:6831/udp"
      - "26832:6832/udp"
      - "25778:5778"
      - "26686:16686"
      - "24268:14268"
      - "29411:9411"
    environment:
      COLLECTOR_ZIPKIN_HOST_PORT: ":9411"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'

  api-gateway:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api-gateway
    container_name: streamgate-api-gateway
    ports:
      - "28080:8080"
      - "29091:9090"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8080
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${DATABASE_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${DATABASE_NAME:-streamgate}
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-minioadmin}
      - STREAMGATE_STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-minioadmin}
      - STREAMGATE_STORAGE_BUCKET=${STORAGE_BUCKET:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - STREAMGATE_ETH_RPC=http://anvil:8545
      - STREAMGATE_CORS_ORIGINS=http://localhost:18000,http://localhost:23000,http://localhost:28080,http://localhost:29091,http://localhost:3000,http://localhost:8080,http://localhost:18080,http://localhost:19090,http://localhost:29090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  transcoder:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.transcoder
    container_name: streamgate-transcoder
    ports:
      - "28081:8081"
      - "29092:9091"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8081
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${DATABASE_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${DATABASE_NAME:-streamgate}
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-minioadmin}
      - STREAMGATE_STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-minioadmin}
      - STREAMGATE_STORAGE_BUCKET=${STORAGE_BUCKET:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  upload:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.upload
    container_name: streamgate-upload
    ports:
      - "28082:8082"
      - "29093:9092"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8082
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${DATABASE_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${DATABASE_NAME:-streamgate}
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-minioadmin}
      - STREAMGATE_STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-minioadmin}
      - STREAMGATE_STORAGE_BUCKET=${STORAGE_BUCKET:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  streaming:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.streaming
    container_name: streamgate-streaming
    ports:
      - "28083:8083"
      - "29094:9093"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8083
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${DATABASE_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${DATABASE_NAME:-streamgate}
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-minioadmin}
      - STREAMGATE_STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-minioadmin}
      - STREAMGATE_STORAGE_BUCKET=${STORAGE_BUCKET:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  metadata:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.metadata
    container_name: streamgate-metadata
    ports:
      - "28084:8084"
      - "29095:9094"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8084
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${DATABASE_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${DATABASE_NAME:-streamgate}
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8084/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  cache:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.cache
    container_name: streamgate-cache
    ports:
      - "28085:8085"
      - "29096:9095"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8085
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${STREAMGATE_DB_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${STREAMGATE_DB_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${STREAMGATE_DB_NAME:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8085/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  auth:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.auth
    container_name: streamgate-auth
    ports:
      - "28086:8086"
      - "29097:9096"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8086
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${STREAMGATE_DB_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${STREAMGATE_DB_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${STREAMGATE_DB_NAME:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - STREAMGATE_ETH_RPC=http://anvil:8545
      - STREAMGATE_SOLANA_RPC=${SOLANA_RPC:-https://api.mainnet-beta.solana.com}
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8086/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  worker:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.worker
    container_name: streamgate-worker
    ports:
      - "28087:8087"
      - "29098:9097"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8087
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${DATABASE_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${DATABASE_NAME:-streamgate}
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_STORAGE_ENDPOINT=minio:9000
      - STREAMGATE_STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:-minioadmin}
      - STREAMGATE_STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:-minioadmin}
      - STREAMGATE_STORAGE_BUCKET=${STORAGE_BUCKET:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8087/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'

  monitor:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.monitor
    container_name: streamgate-monitor
    ports:
      - "28088:8088"
      - "29099:9098"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - STREAMGATE_JWT_SECRET=${STREAMGATE_JWT_SECRET:-sg-dev-jwt-secret-32chars-minimum!!}
      - APP_DEBUG=true
      - STREAMGATE_SERVER_PORT=8088
      - STREAMGATE_REDIS_HOST=redis
      - STREAMGATE_REDIS_PORT=6379
      - STREAMGATE_DB_HOST=postgres
      - STREAMGATE_DB_PORT=5432
      - STREAMGATE_DB_USER=${STREAMGATE_DB_USER:-postgres}
      - STREAMGATE_DB_PASSWORD=${STREAMGATE_DB_PASSWORD:-postgres}
      - STREAMGATE_DB_NAME=${STREAMGATE_DB_NAME:-streamgate}
      - STREAMGATE_NATS_URL=nats://nats:4222
      - STREAMGATE_CONSUL_HOST=consul
      - STREAMGATE_CONSUL_PORT=8500
      - STREAMGATE_JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    depends_on:
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      consul:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8088/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: streamgate-anvil
    entrypoint: ["anvil", "--host", "0.0.0.0", "--chain-id", "31337", "--slots-in-an-epoch", "1"]
    ports:
      - "18545:8545"
    healthcheck:
      test: ["CMD", "cast", "rpc", "eth_chainId"]
      interval: 5s
      timeout: 3s
      retries: 10

  h5-demo:
    image: nginx:alpine
    container_name: streamgate-h5-demo
    ports:
      - "18000:8080"
    volumes:
      - ./h5-demo:/usr/share/nginx/html:ro
      - ./deploy/nginx/microservice.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
  minio-data:
  nats-data:
