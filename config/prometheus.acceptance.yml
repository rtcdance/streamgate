global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'streamgate-acceptance'

scrape_configs:
  - job_name: 'streamgate-monolith'
    static_configs:
      - targets: ['streamgate:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'streamgate-api-gateway'
    static_configs:
      - targets: ['api-gateway:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
