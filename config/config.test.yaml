server:
  host: "localhost"
  port: 18080
  grpc_port: 19090
  mode: "monolith"
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 5s

database:
  host: "localhost"
  port: 5432
  user: "streamgate"
  password: "streamgate_test_password"
  database: "streamgate_test"
  sslmode: "disable"
  maxconns: 5
  max_idle_conns: 1
  conn_max_lifetime: 1m

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 15
  poolsize: 3
  min_idle_conns: 1

storage:
  type: "minio"
  s3:
    endpoint: "http://localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "streamgate-test"
    region: "us-east-1"
    use_ssl: false
  minio:
    endpoint: "http://localhost:9000"
    access_key: "minioadmin"
    secret_key: "minioadmin"
    bucket: "streamgate-test"
    use_ssl: false

transcoding:
  enabled: false
  max_workers: 1
  queue_size: 10
  output_formats:
    - "hls"
  qualities:
    - name: "480p"
      width: 854
      height: 480
      bitrate: 1000000

streaming:
  hls_segment_duration: 2
  dash_segment_duration: 2
  cache_enabled: false
  cache_ttl: 60s
  max_concurrent_streams: 10

web3:
  enabled: false
  chains: []
  chain_id: 1

auth:
  jwt_secret: "test-secret-key"
  jwt_expiry: 1h
  refresh_token_expiry: 24h
  nonce_expiry: 5m

rate_limiting:
  enabled: false
  requests_per_minute: 1000
  requests_per_hour: 10000
  burst_size: 100

monitoring:
  enabled: false
  prometheus_port: 19091
  health_check_interval: 5s
  metrics_path: "/metrics"

logging:
  level: "debug"
  format: "console"
  output: "stdout"
  file: ""
  max_size: 10
  max_backups: 1
  max_age: 1
  compress: false

cors:
  enabled: true
  allowed_origins:
    - "*"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "*"
  exposed_headers:
    - "X-Request-ID"
  max_age: 86400

features:
  nft_gating: false
  signature_auth: false
  chunked_upload: true
  resumable_upload: true
  adaptive_bitrate: false
  multi_codec: false
