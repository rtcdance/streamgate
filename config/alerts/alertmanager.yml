global:
  resolve_timeout: 5m
  http_config:
    follow_redirects: true

route:
  group_by: ['service', 'alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      group_wait: 10s
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'default'
      group_wait: 30s
      repeat_interval: 4h

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'alertname']

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:8080/api/v1/alerts'
        send_resolved: true
