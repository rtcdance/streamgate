server:
  host: "0.0.0.0"
  port: 8080
  grpc_port: 9090
  mode: "monolith"
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 30s

database:
  host: "localhost"
  port: 5432
  user: "streamgate"
  password: ""  # Set via DATABASE_PASSWORD env var in production
  database: "streamgate"
  sslmode: "disable"
  maxconns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0
  poolsize: 10
  min_idle_conns: 2

storage:
  type: "s3"
  s3:
    endpoint: "http://localhost:9000"
    access_key: "minioadmin"
    secret_key: "${S3_SECRET_KEY}"  # REQUIRED: Set via env var in production
    bucket: "streamgate"
    region: "us-east-1"
    use_ssl: false
  minio:
    endpoint: "http://localhost:9000"
    access_key: "minioadmin"
    secret_key: "${MINIO_SECRET_KEY}"  # REQUIRED: Set via env var in production
    bucket: "streamgate"
    use_ssl: false

transcoding:
  enabled: true
  max_workers: 4
  queue_size: 100
  output_formats:
    - "hls"
    - "dash"
  qualities:
    - name: "1080p"
      width: 1920
      height: 1080
      bitrate: 5000000
    - name: "720p"
      width: 1280
      height: 720
      bitrate: 2500000
    - name: "480p"
      width: 854
      height: 480
      bitrate: 1000000
    - name: "360p"
      width: 640
      height: 360
      bitrate: 600000

streaming:
  hls_segment_duration: 10
  dash_segment_duration: 10
  cache_enabled: true
  cache_ttl: 3600s
  max_concurrent_streams: 1000

web3:
  enabled: true
  chains:
    - id: 1
      name: "ethereum"
      rpc_url: "https://eth.llamarpc.com"
      explorer_url: "https://etherscan.io"
    - id: 137
      name: "polygon"
      rpc_url: "https://polygon-rpc.com"
      explorer_url: "https://polygonscan.com"
    - id: 56
      name: "bsc"
      rpc_url: "https://bsc-dataseed1.binance.org:8545"
      explorer_url: "https://bscscan.com"
  chain_id: 1
  rate_limit:
    enabled: false
    rate: 10
    burst: 20

auth:
  jwt_secret: ""  # Set via AUTH_JWT_SECRET env var in production
  jwt_expiry: 24h
  refresh_token_expiry: 168h
  nonce_expiry: 5m

rate_limiting:
  enabled: true
  requests_per_minute: 60
  requests_per_hour: 1000
  burst_size: 10

monitoring:
  enabled: true
  prometheus_port: 9091
  health_check_interval: 30s
  metrics_path: "/metrics"

logging:
  level: "info"
  format: "json"
  output: "stdout"
  file: ""
  max_size: 100
  max_backups: 3
  max_age: 28
  compress: true

cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"
  exposed_headers:
    - "X-Request-ID"
  max_age: 86400

features:
  nft_gating: true
  signature_auth: true
  chunked_upload: true
  resumable_upload: true
  adaptive_bitrate: true
  multi_codec: true
