server:
  host: "localhost"
  port: 8080
  grpc_port: 9090
  mode: "monolith"
  read_timeout: 60s
  write_timeout: 60s
  shutdown_timeout: 10s

database:
  host: "localhost"
  port: 5432
  user: "streamgate"
  password: "${DB_PASSWORD:-streamgate_dev_password}"  # OVERRIDE IN PRODUCTION
  database: "streamgate_dev"
  sslmode: "disable"
  maxconns: 10
  max_idle_conns: 2
  conn_max_lifetime: 5m

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 1
  poolsize: 5
  min_idle_conns: 1

storage:
  type: "minio"
  s3:
    endpoint: "http://localhost:9000"
    access_key: "minioadmin"
    secret_key: "${S3_SECRET_KEY:-minioadmin}"  # OVERRIDE IN PRODUCTION
    bucket: "streamgate-dev"
    region: "us-east-1"
    use_ssl: false
  minio:
    endpoint: "http://localhost:9000"
    access_key: "minioadmin"
    secret_key: "${MINIO_SECRET_KEY:-minioadmin}"  # OVERRIDE IN PRODUCTION
    bucket: "streamgate-dev"
    use_ssl: false

transcoding:
  enabled: true
  max_workers: 2
  queue_size: 50
  output_formats:
    - "hls"
  qualities:
    - name: "720p"
      width: 1280
      height: 720
      bitrate: 2500000
    - name: "480p"
      width: 854
      height: 480
      bitrate: 1000000

streaming:
  hls_segment_duration: 5
  dash_segment_duration: 5
  cache_enabled: true
  cache_ttl: 1800s
  max_concurrent_streams: 100

web3:
  enabled: true
  chains:
    - id: 31337
      name: "anvil-local"
      rpc_url: "http://host.docker.internal:8545"
      rpc_urls:
        - "http://host.docker.internal:8545"
      explorer_url: ""
      currency: "ETH"
    - id: 11155111
      name: "ethereum-sepolia"
      rpc_url: "https://rpc.sepolia.org"
      explorer_url: "https://sepolia.etherscan.io"
    - id: 80002
      name: "polygon-amoy"
      rpc_url: "https://rpc-amoy.polygon.technology"
      explorer_url: "https://amoy.polygonscan.com"
    - id: 97
      name: "bsc-testnet"
      rpc_url: "https://data-seed-prebsc-1-b.binance.org:8545"
      explorer_url: "https://testnet.bscscan.com"
    - id: 421614
      name: "arbitrum-sepolia"
      rpc_url: "https://sepolia-rollup.arbitrum.io/rpc"
      explorer_url: "https://sepolia.arbiscan.io"
  chain_id: 11155111

auth:
  jwt_secret: "${JWT_SECRET:-dev-secret-key-not-for-production}"  # OVERRIDE IN PRODUCTION
  jwt_expiry: 1h
  refresh_token_expiry: 24h
  nonce_expiry: 10m
  siwe_domain: streamgate.io
  siwe_uri: https://streamgate.io/login

rate_limiting:
  enabled: false
  requests_per_minute: 120
  requests_per_hour: 2000
  burst_size: 20

monitoring:
  enabled: true
  prometheus_port: 9091
  health_check_interval: 10s
  metrics_path: "/metrics"

logging:
  level: "debug"
  format: "console"
  output: "stdout"
  file: ""
  max_size: 50
  max_backups: 2
  max_age: 7
  compress: false

cors:
  enabled: true
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"
    - "http://localhost:18080"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
  allowed_headers:
    - "Content-Type"
    - "Authorization"
    - "X-Request-ID"
  exposed_headers:
    - "X-Request-ID"
  max_age: 86400

features:
  nft_gating: true
  signature_auth: true
  chunked_upload: true
  resumable_upload: true
  adaptive_bitrate: false
  multi_codec: false
