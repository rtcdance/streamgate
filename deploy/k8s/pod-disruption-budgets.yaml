  labels:
    app: streamgate
    component: api-gateway
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: streamgate
      component: api-gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: streamgate-streaming-pdb
  labels:
    app: streamgate
