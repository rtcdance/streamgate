apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: streamgate-monolith-pdb
  labels:
    app: streamgate
    component: monolith
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: streamgate
      component: monolith
