  minAvailable: 2
  selector:
    matchLabels:
      app: streamgate
      component: streaming
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: streamgate-auth-pdb
  labels:
    app: streamgate
    component: auth
spec:
  minAvailable: 1
  selector:
