apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: streamgate
spec:
  schedule: "0 2 * * *"
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: backup
            image: postgres:15-alpine
            command:
            - /bin/sh
            - -c
            - |
              BACKUP_FILE="/backups/streamgate_$(date +%Y%m%d_%H%M%S).sql.gz"
              PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                -h postgres-service \
                -U "${POSTGRES_USER}" \
                -d "${POSTGRES_DB}" \
                --no-owner \
                --no-acl \
                | gzip > "${BACKUP_FILE}"
              echo "Backup created: ${BACKUP_FILE}"
              find /backups -name "*.sql.gz" -mtime +7 -delete
              echo "Cleaned up backups older than 7 days"
            env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop:
                - ALL
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: postgres-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: streamgate
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi