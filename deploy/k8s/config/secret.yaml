# ExternalSecret CRDs — managed by External Secrets Operator
# These replace direct K8s Secrets in production.
# ESO fetches secrets from the configured backend (AWS SM / GCP SM / Vault)
# and creates native K8s Secret objects automatically.
#
# For local development, use local-secret.yaml instead.

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: streamgate-secrets
  namespace: streamgate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: streamgate-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_PASSWORD
      remoteRef:
        key: streamgate/production/database
        property: password
    - secretKey: STORAGE_ACCESS_KEY
      remoteRef:
        key: streamgate/production/storage
        property: access_key
    - secretKey: STORAGE_SECRET_KEY
      remoteRef:
        key: streamgate/production/storage
        property: secret_key
    - secretKey: JWT_SECRET
      remoteRef:
        key: streamgate/production/auth
        property: jwt_secret

