---
# Web3 API keys — moved from ConfigMap to secret management
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web3-secrets
  namespace: streamgate
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: web3-secrets
    creationPolicy: Owner
  data:
    - secretKey: ETHEREUM_RPC_URL
      remoteRef:
        key: streamgate/production/web3
        property: ethereum_rpc_url
    - secretKey: SOLANA_RPC_URL
      remoteRef:
        key: streamgate/production/web3
        property: solana_rpc_url
