# Local development K8s Secrets — use this for dev/minikube environments
# that don't have External Secrets Operator installed.
#
# DO NOT use in production. For production, use secret.yaml (ExternalSecret CRDs).
#
# Apply with: kubectl apply -f local-secret.yaml
# Set env vars before applying: export DATABASE_PASSWORD=dev123 ...

apiVersion: v1
kind: Secret
metadata:
  name: streamgate-secrets
  namespace: streamgate
type: Opaque
stringData:
  DATABASE_PASSWORD: "${DATABASE_PASSWORD}"
  STORAGE_ACCESS_KEY: "${MINIO_ACCESS_KEY}"
  STORAGE_SECRET_KEY: "${MINIO_SECRET_KEY}"
  JWT_SECRET: "${JWT_SECRET}"
---
apiVersion: v1
kind: Secret
metadata:
  name: minio-secret
  namespace: streamgate
type: Opaque
stringData:
  MINIO_ROOT_USER: "${MINIO_ACCESS_KEY}"
  MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: streamgate
type: Opaque
stringData:
  POSTGRES_USER: "${POSTGRES_USER}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  POSTGRES_DB: "streamgate"
---
apiVersion: v1
kind: Secret
metadata:
  name: web3-secrets
  namespace: streamgate
type: Opaque
stringData:
  ETHEREUM_RPC_URL: "${ETHEREUM_RPC_URL}"
  SOLANA_RPC_URL: "${SOLANA_RPC_URL}"
