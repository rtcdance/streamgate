# External Secrets Operator — SecretStore configuration
# https://external-secrets.io/latest/provider/aws-secrets-manager/
#
# Deploy with: kubectl apply -f secretstore.yaml
# Requires ESO installed: https://external-secrets.io/latest/introduction/getting-started/
#
# Choose ONE backend by uncommenting the appropriate section below.

---
# AWS Secrets Manager backend
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets

