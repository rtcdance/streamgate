apiVersion: v1
kind: ConfigMap
metadata:
  name: streamgate-config
data:
  ENVIRONMENT: "production"
  DATABASE_HOST: "postgres-service"
  DATABASE_PORT: "5432"
  DATABASE_USER: "postgres"
  DATABASE_NAME: "streamgate"
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  STORAGE_ENDPOINT: "minio-service:9000"
  STORAGE_BUCKET: "streamgate"
  NATS_URL: "nats://nats-service:4222"
  CONSUL_HOST: "consul-service"
  CONSUL_PORT: "8500"
  JAEGER_ENDPOINT: "jaeger-service:4317"
  # ETHEREUM_RPC and SOLANA_RPC moved to web3-secrets (no API keys in ConfigMap)
