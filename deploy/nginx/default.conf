server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; worker-src blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; media-src 'self' blob: data:; connect-src 'self' http://localhost:* ws://localhost:* https://cdn.jsdelivr.net blob:";
    add_header X-Proxy-Mode monolith;

    location ^~ /demo/ {
        alias /usr/share/nginx/html/;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location /health { proxy_pass http://host.docker.internal:18080/health; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /metrics { proxy_pass http://host.docker.internal:18080/metrics; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /api/ { proxy_pass http://host.docker.internal:18080; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header Origin $http_origin; client_max_body_size 500M; }
    location / { try_files $uri $uri/ /index.html; }
}

